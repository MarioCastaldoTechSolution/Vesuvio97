<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prenota | Vesuvio 97</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --gold: #d6a84f;
      --text: #f5f1e8;
      --muted: #a9a39a;
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background:
        linear-gradient(90deg, rgba(5,5,5,0.96) 0%, rgba(5,5,5,0.78) 48%, rgba(5,5,5,0.42) 100%),
        url('https://images.unsplash.com/photo-1579751626657-72bc17010498?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat fixed;
      color: var(--text);
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 76% 46%, rgba(214,168,79,0.2), transparent 30%);
      pointer-events: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 28px 7vw;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Cinzel', serif;
      letter-spacing: 3px;
      font-size: 18px;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--gold);
      font-size: 16px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 30px;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .nav-links a:hover,
    .nav-links .active {
      color: var(--gold);
    }

    main {
      flex: 1;
      display: grid;
      align-items: center;
      max-width: 760px;
      padding: 12vh 0;
      animation: fadeUp 1s ease forwards;
    }

    .eyebrow {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 12px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(34px, 8vw, 96px);
      line-height: 1.02;
      margin-bottom: 24px;
      overflow-wrap: break-word;
    }

    p {
      max-width: 560px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 17px;
      margin-bottom: 34px;
    }

    .btn {
      display: inline-flex;
      width: fit-content;
      padding: 14px 24px;
      border-radius: 999px;
      background: var(--gold);
      color: #14100a;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      font-weight: 700;
      transition: 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(214,168,79,0.25);
    }

    footer {
      padding: 28px 0;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .nav-links {
        display: none;
      }

      .page {
        padding: 24px 6vw;
      }

      main {
        padding: 14vh 0 10vh;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav>
      <a href="index.html" class="logo">
        <span class="logo-mark">N</span>
        <span>Vesuvio 97</span>
      </a>
      <div class="nav-links">
        <a href="menu.html">Menu</a>
        <a href="chi-siamo.html">Chi siamo</a>
        <a href="gallery.html">Gallery</a>
        <a class="active" href="prenota.html">Prenota</a>
      </div>
    </nav>

    <main>
      <div>
        <div class="eyebrow">Prenota</div>
        <h1>PAGINA IN MANUTENZIONE</h1>
        <p>Stiamo preparando questa sezione con la stessa cura dei nostri impasti. Torna presto per scoprire le novita di Vesuvio 97.</p>
        <a class="btn" href="index.html">Torna alla home</a>
      </div>
    </main>

    <footer>&copy; 2026 Vesuvio 97 - Pizzeria Napoletana</footer>
  </div>
</body>
</html>
