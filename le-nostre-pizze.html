<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le nostre pizze | Vesuvio 97</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --gold: #d6a84f;
      --text: #f5f1e8;
      --muted: #a9a39a;
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background:
        linear-gradient(90deg, rgba(5,5,5,0.96) 0%, rgba(5,5,5,0.78) 48%, rgba(5,5,5,0.42) 100%),
        url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat fixed;
      color: var(--text);
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 76% 46%, rgba(214,168,79,0.2), transparent 30%);
      pointer-events: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 28px 7vw;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Cinzel', serif;
      letter-spacing: 3px;
      font-size: 18px;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--gold);
      font-size: 16px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 30px;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .nav-links a:hover,
    .nav-links .active {
      color: var(--gold);
    }

    main {
      flex: 1;
      width: 100%;
      padding: 9vh 0 8vh;
      animation: fadeUp 1s ease forwards;
    }

    .gallery-head {
      max-width: 780px;
      margin-bottom: 42px;
    }

    .eyebrow {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 12px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(34px, 8vw, 96px);
      line-height: 1.02;
      margin-bottom: 24px;
      overflow-wrap: break-word;
    }

    p {
      max-width: 560px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 17px;
    }

    .pizza-gallery {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .pizza-photo {
      min-height: 260px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
    }

    .pizza-photo.tall {
      grid-row: span 2;
      min-height: 540px;
    }

    .pizza-photo.wide {
      grid-column: span 2;
    }

    .pizza-photo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: saturate(0.95) contrast(1.05);
      transition: 0.45s ease;
    }

    .pizza-photo:hover img {
      transform: scale(1.06);
      filter: saturate(1.08) contrast(1.08);
    }

    footer {
      padding: 28px 0;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .nav-links {
        display: none;
      }

      .page {
        padding: 24px 6vw;
      }

      main {
        padding: 10vh 0 8vh;
      }

      .pizza-gallery {
        grid-template-columns: 1fr;
      }

      .pizza-photo,
      .pizza-photo.tall {
        min-height: 320px;
        grid-row: auto;
      }

      .pizza-photo.wide {
        grid-column: auto;
      }
    }
  </style>
  <link rel="stylesheet" href="mobile-menu.css">
</head>
<body>
  <div class="page">
    <nav>
      <a href="index.html" class="logo">
        <span class="logo-mark">V</span>
        <span>Pizzeria Vesuvio 97</span>
      </a>
      <div class="nav-links">
        <a href="le-nostre-pizze.html" class="active">Le nostre pizze</a>
        <a href="ordina-ora.html">Ordina Ora</a>
        <a href="prenota-un-tavolo.html">Prenota un tavolo</a>
        <a href="recensioni.html">Recensioni</a> 
        <a href="chi-siamo.html">Chi siamo</a>
      </div>
      <button class="mobile-menu-btn" type="button" aria-label="Apri menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>

    <main>
      <section class="gallery-head">
        <div class="eyebrow">Le nostre pizze</div>
        <h1>Una carrellata appena sfornata.</h1>
      </section>

      <div class="pizza-gallery" aria-label="Foto delle pizze Vesuvio 97">
        <figure class="pizza-photo tall">
          <img src="images/pizza1.png" alt="Pizza napoletana Vesuvio 97">
        </figure>
        <figure class="pizza-photo">
          <img src="images/pizza2.png" alt="Pizza con ingredienti freschi">
        </figure>
        <figure class="pizza-photo">
          <img src="images/pizza3.png" alt="Pizza appena preparata">
        </figure>
        <figure class="pizza-photo wide">
          <img src="https://images.unsplash.com/photo-1604068549290-dea0e4a305ca?auto=format&fit=crop&w=1200&q=80" alt="Pizza margherita">
        </figure>
        <figure class="pizza-photo">
          <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?auto=format&fit=crop&w=900&q=80" alt="Pizza al forno">
        </figure>
        <figure class="pizza-photo tall">
          <img src="https://images.unsplash.com/photo-1579751626657-72bc17010498?auto=format&fit=crop&w=900&q=80" alt="Pizza servita al tavolo">
        </figure>
        <figure class="pizza-photo">
          <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=900&q=80" alt="Pizza con mozzarella e basilico">
        </figure>
        <figure class="pizza-photo">
          <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=900&q=80" alt="Pizza con salame">
        </figure>
      </div>
    </main>

    <footer>&copy; 2026 Vesuvio 97 - Pizzeria Napoletana</footer>
  </div>
  <script src="mobile-menu.js"></script>
</body>
</html>
